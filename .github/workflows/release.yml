---
name: Release

"on":
  release:
    types:
      - published

jobs:

  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build and deploy collection
        uses: artis3n/ansible_galaxy_collection@v3
        with:
          api_key: '${{ secrets.GALAXY_API_KEY }}'
