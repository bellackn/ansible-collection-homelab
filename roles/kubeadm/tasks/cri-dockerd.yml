---
- name: Fail if not on Debian
  ansible.builtin.fail:
    msg: >-
      This role only works on Debian right now, because that's what I needed.
      I'm happy to review PRs for other distros.
  when: ansible_distribution != "Debian"

- name: Compose file name from distro
  ansible.builtin.set_fact:
    kubeadm_release_filename: "cri-dockerd_{{ kubeadm_cri_dockerd_version }}.3-0.{{ ansible_distribution | lower }}-{{ ansible_distribution_release }}_{{ kubeadm_architecture }}.deb"

- name: Download release file
  ansible.builtin.get_url:
    url: "https://github.com/Mirantis/cri-dockerd/releases/download/v{{ kubeadm_cri_dockerd_version }}/{{ kubeadm_release_filename }}"
    dest: "/tmp/{{ kubeadm_release_filename }}"
    mode: "0644"

- name: Install .deb package
  ansible.builtin.apt:
    deb: "/tmp/{{ kubeadm_release_filename }}"
